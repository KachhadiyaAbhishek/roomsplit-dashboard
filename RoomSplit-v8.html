<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoomSplit — Live Expense Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--bg2:#0d1420;--bg3:#111b2a;--bg4:#172233;--bg5:#1c2940;
  --border:#1a2d45;--border2:#233352;--border3:#2c4270;
  --text:#dce8f5;--text2:#7b93b4;--text3:#354d6a;
  --accent:#2563eb;--accent2:#1d4ed8;
  --green:#10b981;--green-bg:rgba(16,185,129,.1);--green-bdr:rgba(16,185,129,.25);
  --red:#f43f5e;--red-bg:rgba(244,63,94,.1);--red-bdr:rgba(244,63,94,.25);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.1);
  --purple:#8b5cf6;--purple-bg:rgba(139,92,246,.1);
  --sw:224px;--th:54px;--r:8px;--rl:12px
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:3px}
input,select,textarea{font-family:inherit;font-size:13px;background:var(--bg4);border:1px solid var(--border2);color:var(--text);border-radius:var(--r);padding:8px 11px;outline:none;width:100%;transition:border-color .15s,background .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--bg5)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=checkbox],input[type=radio]{width:auto;accent-color:var(--accent);cursor:pointer}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--bg3)}
button{font-family:inherit;cursor:pointer;border:none;border-radius:var(--r);font-size:13px;font-weight:500;padding:7px 14px;transition:all .14s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
button:active{transform:scale(.97)}
.bp{background:var(--accent);color:#fff}.bp:hover{background:var(--accent2)}
.bg2btn{background:transparent;color:var(--text2);border:1px solid var(--border2)}.bg2btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border3)}
.bdn{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bdr)}.bdn:hover{background:rgba(244,63,94,.22)}
.bsn{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bdr)}.bsn:hover{background:rgba(16,185,129,.2)}
.bsm{padding:4px 9px;font-size:11px}
.bic{padding:4px;width:26px;height:26px;justify-content:center;flex-shrink:0;font-size:11px}
/* Shell */
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:var(--th);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:200}
.main{display:flex;flex:1;overflow:hidden;position:relative}
/* Sidebar */
.sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:transform .25s;z-index:150}
.sb-scroll{flex:1;overflow-y:auto;padding:10px 9px;display:flex;flex-direction:column;gap:2px}
.sb-sec{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:8px 9px 3px;margin-top:4px}
.nbtn{width:100%;text-align:left;background:transparent;border:1px solid transparent;color:var(--text2);padding:7px 9px;border-radius:var(--r);font-size:13px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:all .14s}
.nbtn:hover{background:var(--bg3);color:var(--text);border-color:var(--border)}
.nbtn.act{background:var(--bg4);color:var(--text);border-color:var(--border2);font-weight:500}
.ni{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.gbrw{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.gbtn{flex:1;text-align:left;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 8px;border-radius:var(--r);font-size:11px;cursor:pointer;transition:all .14s;display:flex;align-items:center;gap:4px;min-width:0}
.gbtn:hover{border-color:var(--border2);color:var(--text)}
.gbtn.act{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 10px rgba(37,99,235,.25)}
.gbtn span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.xb{flex-shrink:0;width:19px;height:19px;padding:0;font-size:10px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2);color:var(--red);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .14s;font-family:inherit}
.xb:hover:not(:disabled){background:rgba(244,63,94,.25);border-color:var(--red)}
.xb:disabled{opacity:.25;cursor:not-allowed}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:140}
.ovl.open{display:block}
/* Content */
.content{flex:1;overflow-y:auto;padding:20px;min-width:0}
/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px 15px}
.scard .sl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.scard .sv{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
/* Table — professional centered layout */
.tw{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--border2);-webkit-overflow-scrolling:touch;box-shadow:0 2px 12px rgba(0,0,0,.25)}
table{width:100%;border-collapse:collapse;min-width:820px}
thead{position:sticky;top:0;z-index:3}
th{background:var(--bg3);font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;padding:11px 10px;text-align:center;vertical-align:middle;white-space:nowrap;border-bottom:2px solid var(--border2);border-right:1px solid var(--border)}
th:last-child{border-right:none}
th:first-child{text-align:left;position:sticky;left:0;z-index:4;background:var(--bg3);border-right:2px solid var(--border2)}
td{padding:7px 10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:middle;text-align:center}
td:last-child{border-right:none}
td:first-child{position:sticky;left:0;background:var(--bg2);z-index:1;min-width:150px;text-align:left;border-right:2px solid var(--border2)}
tbody tr:nth-child(even) td{background:rgba(255,255,255,.008)}
tbody tr:nth-child(even) td:first-child{background:rgba(17,27,42,.7)}
tbody tr:hover td{background:rgba(37,99,235,.06)!important}
tbody tr:hover td:first-child{background:rgba(37,99,235,.1)!important}
.tfoot td{background:var(--bg3);border-top:2px solid var(--border2);border-bottom:none;font-variant-numeric:tabular-nums;font-size:11px;font-weight:700;padding:10px;text-align:center}
.tfoot td:first-child{background:var(--bg3);text-align:left;font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--text2)}
.ci{background:transparent;border:1px solid transparent;border-radius:5px;padding:4px 5px;font-variant-numeric:tabular-nums;font-size:12px;color:var(--text);text-align:center;width:80px;transition:all .12s;display:block;margin:0 auto}
.ci:hover:not(:focus){border-color:var(--border2);background:var(--bg4)}
.ci:focus{background:var(--bg5);border-color:var(--accent);outline:none;box-shadow:0 0 0 2px rgba(37,99,235,.2)}
/* Misc */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.av-lg{width:40px;height:40px;font-size:14px}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:999;padding:14px;backdrop-filter:blur(4px)}
.mbox{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:20px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.mfoot{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;flex-wrap:wrap}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.spill{display:flex;gap:5px;flex-wrap:wrap}
.spill-p{flex:1;min-width:80px;padding:6px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg4);color:var(--text2);text-align:center;transition:all .14s;user-select:none}
.spill-p.act{background:var(--accent);color:#fff;border-color:var(--accent)}
.shdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:8px;flex-wrap:wrap}
.shdr h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px}
.shdr .sub{font-size:11px;color:var(--text2);margin-top:2px}
.cg{color:var(--green)}.cr{color:var(--red)}.cb{color:#60a5fa}
.empty{text-align:center;padding:40px 16px;color:var(--text3)}
.pbar{height:4px;border-radius:2px;background:var(--border);overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width .5s}
.ndot{width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block;margin-left:3px;flex-shrink:0}
.ei{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:6px;transition:all .14s}
.ei:hover{border-color:var(--border2);background:var(--bg4)}
.esc{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:7px}
.ins{display:flex;align-items:flex-start;gap:9px;padding:9px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px}
.ri{display:flex;align-items:center;gap:7px;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;flex-wrap:wrap;transition:border-color .14s}
.ri:hover{border-color:var(--border2)}
.mcrow{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--bg3);border-radius:7px;margin-bottom:4px;border:1px solid transparent;cursor:pointer;transition:all .14s;user-select:none}
.mcrow.sel{border-color:var(--accent);background:rgba(37,99,235,.06)}
.srow{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--bg3);border-radius:7px;margin-bottom:4px}
.srow input{width:80px;flex-shrink:0}
/* Sync indicator */
.sync-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid}
.sync-pill.live{background:rgba(16,185,129,.1);color:var(--green);border-color:rgba(16,185,129,.3)}
.sync-pill.syncing{background:rgba(245,158,11,.1);color:var(--amber);border-color:rgba(245,158,11,.3)}
.sync-pill.error{background:var(--red-bg);color:var(--red);border-color:var(--red-bdr)}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-m{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),#7c3aed);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.logo-t{font-size:13px;font-weight:700;letter-spacing:-.4px}
.logo-t span{color:var(--accent)}
.tag-p{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.3);border-radius:20px;padding:2px 8px;font-size:10px;display:inline-flex;align-items:center;gap:4px;margin:2px}
/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--rl);padding:11px 16px;font-size:13px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:9999;display:flex;align-items:center;gap:9px;max-width:300px;pointer-events:none}
@keyframes su{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.toast{animation:su .25s ease}
/* Ham */
.ham{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:7px;border-radius:6px;background:transparent;border:1px solid var(--border);flex-shrink:0}
.ham span{display:block;width:17px;height:2px;background:var(--text2);border-radius:2px;transition:all .2s}
.divider{height:1px;background:var(--border);margin:12px 0}
/* Inline sheet badge — live sync */
.live-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:600;color:var(--green);background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:1px 6px;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
/* DB Setup panel */
.dbpanel{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:20px;margin-bottom:20px}
.dbpanel .dp-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.conn-status{padding:10px 14px;border-radius:8px;font-size:12px;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.conn-status.ok{background:var(--green-bg);border:1px solid var(--green-bdr);color:var(--green)}
.conn-status.fail{background:var(--red-bg);border:1px solid var(--red-bdr);color:var(--red)}
.conn-status.idle{background:var(--bg4);border:1px solid var(--border);color:var(--text2)}
/* Responsive */
@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);box-shadow:4px 0 20px rgba(0,0,0,.5);padding-top:var(--th)}
  .sidebar.open{transform:translateX(0)}
  .ham{display:flex}
  .content{padding:12px}
  .fgrid{grid-template-columns:1fr}
  .hm{display:none!important}
  .sgrid{grid-template-columns:1fr 1fr!important}
  .cgrid{grid-template-columns:1fr!important}
  .mgrid{grid-template-columns:1fr!important}
  .mbox{padding:14px}
  table{min-width:580px}
  .ci{width:64px}
}
@media(max-width:480px){
  .logo-t{display:none}
  .content{padding:9px}
  .sgrid{grid-template-columns:1fr 1fr!important}
  .topbar{padding:0 10px;gap:7px}
  .mfoot button{flex:1;justify-content:center}
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <button class="ham" id="hamBtn"><span></span><span></span><span></span></button>
    <div class="logo">
      <div class="logo-m">₹</div>
      <div class="logo-t">Room<span>Split</span></div>
    </div>
    <div id="grpBadge" style="font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:3px 9px;border-radius:20px;display:flex;align-items:center;gap:5px;max-width:140px;overflow:hidden;flex-shrink:0">
      <span style="color:var(--green);font-size:9px;flex-shrink:0">●</span>
      <span id="grpName" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</span>
    </div>
    <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
      <div id="dbBadge" class="sync-pill syncing">
        <span id="dbIcon">⏳</span><span id="dbTxt">Connecting…</span>
      </div>
      <button class="bg2btn bsm hm" id="csvBtn">↓ CSV</button>
      <button class="bg2btn bsm hm" id="dupBtn" title="Dup to next month">⧉</button>
      <button class="bp bsm" id="addMbBtn">+ Member</button>
      <button class="bg2btn bsm bic hm" id="resetBtn" title="Reset" style="font-size:14px">↺</button>
      <button class="bg2btn bsm hm" id="dbSettingsBtn" title="DB Settings" style="font-size:14px">🗄</button>
    </div>
  </div>
  <div class="main">
    <div class="ovl" id="ovl"></div>
    <div class="sidebar" id="sidebar">
      <div class="sb-scroll">
        <div class="sb-sec">Navigation</div>
        <div id="navLinks"></div>
        <div class="sb-sec" style="margin-top:8px">Groups (Monthly Sheets)</div>
        <div id="groupList"></div>
        <button class="nbtn" style="font-size:11px;margin-top:2px" id="addGrpBtn"><span class="ni">＋</span>New Group</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="toast" id="toast" style="display:none"></div>
<div class="mbg" id="mbg" style="display:none"><div class="mbox" id="mbox"></div></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════
const CATS=['Rent','Other','Cleaning','Gas','Electricity'];
const CICO={Rent:'🏠',Other:'📦',Cleaning:'🧹',Gas:'🔥',Electricity:'⚡'};
const CCOL=['#3b82f6','#8b5cf6','#10b981','#f59e0b','#f43f5e'];
const MCOL=['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#06b6d4','#f43f5e','#a3e635'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const gi=()=>Math.random().toString(36).slice(2,9);
const fN=n=>'₹'+Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const ini=n=>n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const gc=i=>MCOL[i%MCOL.length];
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ═══════════════════════════════════════════════════════════════
// CORE CALCULATION ENGINE
// All sheet values are DERIVED from expenses + recurring + manual entries
// This is the single source of truth
// ═══════════════════════════════════════════════════════════════
function deriveSheetRows(sheet, members, expenses, recurring) {
  // Build rows with manual base values. Other starts at 0 (computed from expenses).
  // All CATS initialised to 0 first, then filled from manualBase, then expenses/recurring.
  const rows = members.map(m => {
    const base = sheet.manualBase?.[m.id] || {};
    const row = { memberId: m.id, Investment: Number(base.Investment||0) };
    CATS.forEach(c => { row[c] = c === 'Other' ? 0 : Number(base[c]||0); });
    return row;
  });

  const rowMap = Object.fromEntries(rows.map(r=>[r.memberId,r]));

  // Apply expenses that belong to this sheet's month/year
  const sheetExpenses = expenses.filter(e => {
    if (!e.sheetMonth && e.sheetMonth!==0) return true; // legacy: apply to any
    return e.sheetMonth === sheet.month && e.sheetYear === sheet.year;
  });

  sheetExpenses.forEach(e => {
    const targets = e.splitType==='equal'
      ? (e.memberSplit?.length ? e.memberSplit : members.map(m=>m.id))
      : members.map(m=>m.id);

    if (e.splitType==='equal') {
      const per = Number((e.amount / targets.length).toFixed(2));
      targets.forEach(mid => { if(rowMap[mid]) rowMap[mid].Other += per; });
    } else if (e.splitType==='percentage') {
      members.forEach(m => {
        if(rowMap[m.id]) rowMap[m.id].Other += Number(((e.pcts[m.id]||0)/100*e.amount).toFixed(2));
      });
    } else if (e.splitType==='manual') {
      members.forEach(m => {
        if(rowMap[m.id]) rowMap[m.id].Other += Number(e.customPer[m.id]||0);
      });
    }
    // Investment for payer
    if (e.addToInvestment && e.paidBy && rowMap[e.paidBy]) {
      rowMap[e.paidBy].Investment += Number(e.amount);
    }
  });

  // Apply active recurring expenses — use r.category if set, else 'Other'
  const activeRecurring = recurring.filter(r => r.enabled);
  activeRecurring.forEach(r => {
    const cat = (r.category && CATS.includes(r.category)) ? r.category : 'Other';
    const targets = r.memberSplit?.length ? r.memberSplit : members.map(m=>m.id);
    const per = Number((r.amount / targets.length).toFixed(2));
    targets.forEach(mid => { if(rowMap[mid]) rowMap[mid][cat] += per; });
    if (r.paidBy && r.addToInvestment && rowMap[r.paidBy]) {
      rowMap[r.paidBy].Investment += Number(r.amount);
    }
  });

  return rows;
}

function calcRow(r) {
  const total = CATS.reduce((s,c)=>s+Number(r[c]||0), 0);
  return {...r, total, payable: total - Number(r.Investment||0)};
}

function getDerivedRows(g, sheetId) {
  const sheet = g.sheets.find(s=>s.id===sheetId) || g.sheets[0];
  if (!sheet) return [];
  const raw = deriveSheetRows(sheet, g.members, g.expenses, g.recurring);
  return raw.map(calcRow);
}

// ═══════════════════════════════════════════════════════════════
// DEFAULT DATA
// ═══════════════════════════════════════════════════════════════

// POSTGRESQL DATABASE LAYER
// ═══════════════════════════════════════════════════════════════
const DB_KEY = 'roomsplit_v5_data';
const DB_CFG_KEY = 'roomsplit_v5_pgcfg';

let pgConfig = null;      // {host,port,db,user,password,ssl}
let pgConnected = false;
let pgApiBase = '';       // backend API URL if configured
let _saveTimer = null;

// --- Load / Save config ---
function loadPgConfig(){
  try{ const r=localStorage.getItem(DB_CFG_KEY); if(r) return JSON.parse(r); }catch(e){}
  return null;
}
function savePgConfig(cfg){
  try{ localStorage.setItem(DB_CFG_KEY, JSON.stringify(cfg)); }catch(e){}
}

// --- DB Status UI ---
function setDbStatus(s, detail){
  const b=document.getElementById('dbBadge');
  const ic=document.getElementById('dbIcon');
  const tx=document.getElementById('dbTxt');
  if(!b||!ic||!tx) return;
  const map={
    connecting:{cls:'syncing',i:'⏳',t:'Connecting…'},
    saving:    {cls:'syncing',i:'💾',t:'Saving…'},
    saved:     {cls:'live',   i:'✓', t:'PostgreSQL'},
    local:     {cls:'live',   i:'💾',t:'Local Saved'},
    error:     {cls:'error',  i:'⚠', t:detail||'DB Error'},
    offline:   {cls:'syncing',i:'📴',t:'Local Only'},
  };
  const m=map[s]||map.local;
  b.className='sync-pill '+m.cls;
  ic.textContent=m.i;
  tx.textContent=m.t;
}

// --- Try to connect to PostgreSQL via backend API ---
async function tryPgConnect(){
  pgConfig = loadPgConfig();
  if(!pgConfig?.apiUrl){ setDbStatus('offline'); return false; }
  pgApiBase = pgConfig.apiUrl;
  setDbStatus('connecting');
  try{
    const r = await fetch(`${pgApiBase}/api/health`, {method:'GET', signal:AbortSignal.timeout(4000)});
    if(r.ok){
      pgConnected = true;
      setDbStatus('saved');
      return true;
    }
  }catch(e){}
  pgConnected = false;
  setDbStatus('offline');
  return false;
}

// --- Save to PostgreSQL via REST API ---
async function pgSave(data){
  if(!pgConnected||!pgApiBase) return false;
  try{
    const r = await fetch(`${pgApiBase}/api/roomsplit`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({key: DB_KEY, data}),
      signal: AbortSignal.timeout(5000),
    });
    return r.ok;
  }catch(e){ pgConnected=false; setDbStatus('offline'); return false; }
}

async function pgLoad(){
  if(!pgConnected||!pgApiBase) return null;
  try{
    const r = await fetch(`${pgApiBase}/api/roomsplit?key=${DB_KEY}`, {signal:AbortSignal.timeout(5000)});
    if(!r.ok) return null;
    const j = await r.json();
    return j.data||null;
  }catch(e){ return null; }
}

// --- Universal load/save (PG first, localStorage fallback) ---
async function dbLoad(){
  await tryPgConnect();
  if(pgConnected){
    const pg = await pgLoad();
    if(pg){ setDbStatus('saved'); return pg; }
  }
  // fallback
  try{ const r=localStorage.getItem(DB_KEY); if(r) return JSON.parse(r); }catch(e){}
  if(window.storage){ try{ const r=await window.storage.get(DB_KEY); if(r?.value) return JSON.parse(r.value); }catch(e){} }
  return null;
}

async function dbSave(data){
  const str = JSON.stringify(data);
  // Always save locally first (instant)
  try{ localStorage.setItem(DB_KEY, str); }catch(e){}
  if(window.storage){ try{ await window.storage.set(DB_KEY, str); }catch(e){} }
  // Then try PG
  if(pgConnected){
    const ok = await pgSave(data);
    if(ok){ setDbStatus('saved'); return; }
  }
  setDbStatus('local');
}

function toast(msg, icon='✓', color='var(--green)'){
  const t=document.getElementById('toast');
  t.innerHTML=`<span style="font-size:15px">${icon}</span><span style="color:${color}">${esc(msg)}</span>`;
  t.style.display='flex'; clearTimeout(_toastT);
  _toastT=setTimeout(()=>t.style.display='none',3000);
}

function commit(){
  setDbStatus('saving');
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{ await dbSave(STATE); },500);
  render();
}

const getG = id => STATE.groups.find(g=>g.id===(id||STATE.activeGroupId));
const AG = () => getG(STATE.activeGroupId);
const AS = () => { const g=AG(); return g?g.sheets.find(s=>s.id===g.activeSheetId)||null:null; };
const MM = () => { const g=AG(); return g?Object.fromEntries(g.members.map(m=>[m.id,m])):{} };

function calcSettlements(g, sheetId){
  const rows = getDerivedRows(g, sheetId);
  const bal = rows.map(r=>({id:r.memberId, b:-r.payable}));
  const d=bal.filter(x=>x.b<0).map(x=>({...x,b:-x.b})).sort((a,b)=>b.b-a.b);
  const c=bal.filter(x=>x.b>0).sort((a,b)=>b.b-a.b);
  const tx=[], dc=d.map(x=>({...x})), cc=c.map(x=>({...x}));
  let di=0,ci=0;
  while(di<dc.length&&ci<cc.length){
    const a=Math.min(dc[di].b,cc[ci].b);
    if(a>0.01) tx.push({from:dc[di].id,to:cc[ci].id,amount:a});
    dc[di].b-=a; cc[ci].b-=a;
    if(dc[di].b<0.01)di++; if(cc[ci].b<0.01)ci++;
  }
  return tx;
}

function getSheetTotals(rows){
  const t={};
  CATS.forEach(c=>{ t[c]=rows.reduce((s,r)=>s+Number(r[c]||0),0); });
  t.total=rows.reduce((s,r)=>s+r.total,0);
  t.investment=rows.reduce((s,r)=>s+Number(r.Investment||0),0);
  t.net=t.total-t.investment;
  return t;
}

function addGroup(name, mode, names){
  let members = mode==='same'&&AG() ? AG().members.map(m=>({...m}))
    : (names||[]).filter(Boolean).map((n,i)=>({id:gi(),name:n,role:'Member',color:gc(i)}));
  const sid=gi();
  const ng={id:gi(),name,activeSheetId:sid,members,
    sheets:[{id:sid,month:new Date().getMonth(),year:new Date().getFullYear(),manualBase:blankManual(members)}],
    expenses:[],recurring:[]};
  STATE.groups.push(ng); STATE.activeGroupId=ng.id;
  toast(`Group "${name}" created`,'📁'); commit();
}
function delGroup(id){
  if(STATE.groups.length<=1){alert('Cannot remove last group.');return;}
  if(!confirm('Delete group and all data?')) return;
  STATE.groups=STATE.groups.filter(g=>g.id!==id);
  if(STATE.activeGroupId===id) STATE.activeGroupId=STATE.groups[0].id;
  toast('Group deleted','🗑','var(--red)'); commit();
}
function swGroup(id){ STATE.activeGroupId=id; closeSB(); render(); }

function addMember(data){
  const g=AG(); const nm={...data,id:gi(),color:gc(g.members.length)};
  g.members.push(nm);
  g.sheets.forEach(s=>{ if(!s.manualBase) s.manualBase={}; s.manualBase[nm.id]={Rent:0,Cleaning:0,Gas:0,Electricity:0,Investment:0}; });
  toast(`${nm.name} added`,'👤'); commit();
}
function editMember(id,data){ const g=AG(); const m=g.members.find(x=>x.id===id); if(m){Object.assign(m,data);commit();} }
function delMember(id){
  const g=AG(); if(g.members.length<=1){alert('Cannot remove last member.');return;}
  if(!confirm('Remove member?')) return;
  g.members=g.members.filter(m=>m.id!==id);
  g.sheets.forEach(s=>{ if(s.manualBase) delete s.manualBase[id]; });
  g.expenses=g.expenses.filter(e=>e.paidBy!==id); // clean up
  commit();
}

function addSheet(month,year){
  const g=AG(); const ex=g.sheets.find(s=>s.month===month&&s.year===year);
  if(ex){g.activeSheetId=ex.id;commit();return;}
  const ns={id:gi(),month,year,manualBase:blankManual(g.members)};
  g.sheets.push(ns); g.activeSheetId=ns.id;
  toast('Sheet created','📋'); commit();
}
function delSheet(id){
  const g=AG(); if(g.sheets.length<=1){alert('Cannot remove last sheet.');return;}
  g.sheets=g.sheets.filter(s=>s.id!==id);
  if(g.activeSheetId===id){
    const sorted=[...g.sheets].sort((a,b)=>(a.year*12+a.month)-(b.year*12+b.month));
    g.activeSheetId=sorted[sorted.length-1].id;
  }
  commit();
}
function swSheet(id){ AG().activeSheetId=id; closeSB(); render(); }
function dupSheet(){
  const g=AG(); const s=AS(); if(!s) return;
  const nm=s.month+1>11?0:s.month+1; const ny=s.month===11?s.year+1:s.year;
  const ex=g.sheets.find(x=>x.month===nm&&x.year===ny);
  if(ex){g.activeSheetId=ex.id;commit();return;}
  const ns={id:gi(),month:nm,year:ny,manualBase:JSON.parse(JSON.stringify(s.manualBase||{}))};
  g.sheets.push(ns); g.activeSheetId=ns.id;
  toast('Duplicated to next month','⧉'); commit();
}

// Manual base cell update (Rent, Cleaning, Gas, Electricity, Investment)
function updateManual(memberId, field, val){
  const s=AS(); if(!s) return;
  if(!s.manualBase) s.manualBase={};
  if(!s.manualBase[memberId]) s.manualBase[memberId]={Rent:0,Cleaning:0,Gas:0,Electricity:0,Investment:0};
  s.manualBase[memberId][field] = Number(val)||0;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{ await dbSave(STATE); setDbStatus(pgConnected?'saved':'local'); },800);
  setDbStatus('saving');
  renderContent(); // re-derive and re-render immediately
}

function initExpForm(){
  const g=AG(); const today=new Date().toISOString().slice(0,10);
  expForm={title:'',amount:'',paidBy:g?.members[0]?.id||'',splitType:'equal',date:today,addToInvestment:true,editId:null};
  expTags=[];
  expChecked=Object.fromEntries((g?.members||[]).map(m=>[m.id,true]));
  const n=g?.members?.length||1;
  expPcts=Object.fromEntries((g?.members||[]).map(m=>[m.id,String((100/n).toFixed(1))]));
  expCustom=Object.fromEntries((g?.members||[]).map(m=>[m.id,'']));
}
function loadExpIntoForm(e){
  expForm={title:e.title,amount:String(e.amount),paidBy:e.paidBy,splitType:e.splitType,date:e.date,addToInvestment:e.addToInvestment,editId:e.id};
  expTags=[...(e.tags||[])];
  const g=AG();
  expChecked=Object.fromEntries((g?.members||[]).map(m=>[m.id,e.memberSplit?e.memberSplit.includes(m.id):true]));
  expPcts={...e.pcts};
  expCustom={...e.customPer};
}

// ── Expense form: safe partial-update helpers (never re-render whole page) ──
// Called from inline event handlers — updates only the live-preview spans
function _efUpdatePreviews(){
  // per-person equal split preview
  const g=AG(); if(!g||!expForm) return;
  const checked=g.members.filter(m=>expChecked[m.id]);
  const amt=Number(expForm.amount||0);
  const perP=amt&&checked.length ? fN(amt/checked.length) : '—';
  // update per-member spans in equal mode
  g.members.forEach(m=>{
    const sp=document.getElementById('efper_'+m.id);
    if(sp){ sp.textContent=(expChecked[m.id]&&amt)?perP:''; }
  });
  // summary line
  const sumEl=document.getElementById('efSummaryLine');
  if(sumEl) sumEl.innerHTML=`${checked.length} selected · Each: <strong style="color:#60a5fa">${perP}</strong>`;
  // investment label
  const invEl=document.getElementById('efInvLabel');
  if(invEl){
    const payer=MM()[expForm.paidBy];
    invEl.innerHTML=`💰 Add <strong style="color:#a78bfa">${amt?fN(amt):'amount'}</strong> to <strong style="color:var(--text)">${esc(payer?.name.split(' ')[0]||'payer')}</strong>'s Investment → auto-updates sheet`;
  }
  // pct preview spans
  g.members.forEach(m=>{
    const sp=document.getElementById('efpct_'+m.id);
    if(sp) sp.textContent=amt?fN((Number(expPcts[m.id]||0)/100)*amt):'—';
  });
  // pct total
  const ptEl=document.getElementById('efPctTotal');
  if(ptEl){
    const tot=Object.values(expPcts).reduce((s,v)=>s+Number(v||0),0);
    ptEl.textContent=tot.toFixed(1)+'%';
    ptEl.style.color=Math.abs(tot-100)<0.1?'var(--green)':'var(--red)';
  }
  // custom total
  const ctEl=document.getElementById('efCustTotal');
  if(ctEl) ctEl.textContent=fN(Object.values(expCustom).reduce((s,v)=>s+Number(v||0),0));
}

function _efSetField(field, value){ if(expForm) expForm[field]=value; _efUpdatePreviews(); }
function _efSetPct(mid, value){ expPcts[mid]=value; _efUpdatePreviews(); }
function _efSetCust(mid, value){ expCustom[mid]=value; _efUpdatePreviews(); }
function _efToggleInv(){ if(expForm){ expForm.addToInvestment=!expForm.addToInvestment; const cb=document.getElementById('efInvChk'); if(cb) cb.checked=expForm.addToInvestment; _efUpdatePreviews(); } }

function _efChangeSplitType(t){
  if(!expForm) return;
  expForm.splitType=t;
  // Re-render only the split section
  const box=document.getElementById('efSplitSection');
  if(box){ box.innerHTML=_buildSplitSection(); bindExpFormEvents(); }
  // update pills
  document.querySelectorAll('.spill-p[data-st]').forEach(el=>{ el.classList.toggle('act',el.dataset.st===t); });
}

  if(expForm.splitType==='equal') return `
    <div class="fr">

        <span>Select Members to Split Equally</span>

          <span style="flex:1;font-size:12px">${esc(m.name)}</span>
          <span id="efper_${m.id}" style="font-variant-numeric:tabular-nums;font-size:11px;color:#60a5fa">${expChecked[m.id]&&amt?perP:''}</span>
        </div>`).join('')}
      <div id="efSummaryLine" style="margin-top:5px;padding:5px 9px;background:var(--bg3);border-radius:6px;font-size:11px;color:var(--text2)">${checked.length} selected · Each: <strong style="color:#60a5fa">${perP}</strong></div>
    </div>`;

  if(expForm.splitType==='percentage') return `
    <div class="fr">
      <label>% per Member <span style="color:var(--text3);font-weight:400">(must total 100%)</span></label>
      ${g.members.map(m=>{const a=amt?((expPcts[m.id]||0)/100*amt):0;return`
        <div class="srow">

          <span style="flex:1;font-size:12px">${esc(m.name.split(' ')[0])}</span>
          <input type="number" min="0" max="100" value="${expPcts[m.id]||''}" placeholder="0" style="width:65px" oninput="_efSetPct('${m.id}',this.value)">
          <span style="font-size:10px;color:var(--text3)">%</span>
          <span id="efpct_${m.id}" style="font-variant-numeric:tabular-nums;font-size:11px;color:#60a5fa;min-width:68px;text-align:right">${amt?fN(a):'—'}</span>
        </div>`;}).join('')}
      <div style="margin-top:5px;font-size:11px">Total: <strong id="efPctTotal" style="font-variant-numeric:tabular-nums;color:${Math.abs(totPct-100)<0.1?'var(--green)':'var(--red)'}">${totPct.toFixed(1)}%</strong>${Math.abs(totPct-100)>=0.1?' <span style="color:var(--red)">⚠ Must = 100%</span>':' <span style="color:var(--green)">✓</span>'}</div>
    </div>`;

  if(expForm.splitType==='manual') return `
    <div class="fr">
      <label>Custom Amount per Member <span style="color:var(--text3);font-weight:400">(each member's share in ₹)</span></label>
      ${g.members.map(m=>`
        <div class="srow">
          <div class="av" style="background:${m.color}22;color:${m.color};width:24px;height:24px;font-size:9px">${ini(m.name)}</div>
          <span style="flex:1;font-size:12px">${esc(m.name.split(' ')[0])}</span>

    </div>`;
  return '';

function toggleExpForm(){
  const b=document.getElementById('expFormBox');
  if(!b){ initExpForm(); renderContent(); setTimeout(()=>{const x=document.getElementById('expFormBox');if(x)x.style.display='block';},30); return; }
  if(b.style.display==='none'||b.style.display===''){
    if(!expForm) initExpForm();
    renderContent();
    setTimeout(()=>{const x=document.getElementById('expFormBox');if(x){x.style.display='block';x.scrollIntoView({behavior:'smooth',block:'nearest'});}},30);
  } else {
    b.style.display='none';
  }
}
function cancelExpForm(){ expForm=null; expTags=[]; expChecked={}; expPcts={}; expCustom={}; renderContent(); }
function cancelExpEdit(){ initExpForm(); renderContent(); setTimeout(()=>{const b=document.getElementById('expFormBox');if(b)b.style.display='block';},30); }
function editExpense(id){
  const g=AG(); const e=g.expenses.find(x=>x.id===id); if(!e) return;
  loadExpIntoForm(e); renderContent();
  setTimeout(()=>{ const b=document.getElementById('expFormBox'); if(b){b.style.display='block';b.scrollIntoView({behavior:'smooth',block:'start'});} },30);
}
function toggleExpCheck(id){ expChecked[id]=!expChecked[id]; renderContent(); const b=document.getElementById('expFormBox');if(b)b.style.display='block'; }
function checkAllExp(v){ AG()?.members.forEach(m=>{expChecked[m.id]=v;}); renderContent(); const b=document.getElementById('expFormBox');if(b)b.style.display='block'; }
function addTag(){ const i=document.getElementById('tagInp'); const v=i?.value.trim(); if(v&&!expTags.includes(v)){expTags.push(v);renderContent();const b=document.getElementById('expFormBox');if(b)b.style.display='block';} if(i)i.value=''; }
function removeTag(i){ expTags.splice(i,1); renderContent(); const b=document.getElementById('expFormBox');if(b)b.style.display='block'; }
function submitExpense(){
  if(!expForm){toast('Form not ready','⚠','var(--amber)');return;}
  const g=AG();
  if(!g){toast('No active group','⚠','var(--amber)');return;}
  const title=(expForm.title||'').trim();
  const amount=Number(expForm.amount||0);
  if(!title){toast('Enter a title','⚠','var(--amber)');return;}
  if(!amount||amount<=0){toast('Enter a valid amount','⚠','var(--amber)');return;}
  if(expForm.splitType==='percentage'){
    const totP=Object.values(expPcts).reduce((s,v)=>s+Number(v||0),0);
    if(Math.abs(totP-100)>=0.1){toast('Percentages must total 100%','⚠','var(--amber)');return;}
  }
  const checkedList=g.members.filter(m=>!!expChecked[m.id]);
  if(expForm.splitType==='equal'&&checkedList.length===0){toast('Select at least one member','⚠','var(--amber)');return;}
  // Build clean payload — never include editId in stored object
  const {editId, ...formData} = expForm;
  const payload={
    ...formData,
    title,
    amount,
    memberSplit: expForm.splitType==='equal' ? checkedList.map(m=>m.id) : null,
    pcts: expForm.splitType==='percentage' ? {...expPcts} : {},
    customPer: expForm.splitType==='manual' ? {...expCustom} : {},
    tags: [...(expTags||[])],
  };
  // Reset form state BEFORE commit (commit triggers render which reads expForm)
  expForm=null; expTags=[]; expChecked={}; expPcts={}; expCustom={};
  if(editId){ updateExpense(editId, payload); }
  else { addExpense(payload); }
}

// ANALYTICS VIEW
// ═══════════════════════════════════════════════════════════════
function vAnalytics(){
  const g=AG(); if(!g) return '';
  const sh=AS();
  const rows=sh?getDerivedRows(g,sh.id):[];
  const mm=MM();
  const catT=CATS.map((c,i)=>({cat:c,val:rows.reduce((s,r)=>s+Number(r[c]||0),0),col:CCOL[i]}));
  const total=catT.reduce((s,c)=>s+c.val,0);
  const currT=rows.reduce((s,r)=>s+r.total,0);
  const totalExp=g.expenses.reduce((s,e)=>s+e.amount,0);
  const sorted=[...g.sheets].sort((a,b)=>(a.year*12+a.month)-(b.year*12+b.month));
  const maxMem=Math.max(...rows.map(r=>r.total),1);
  const expByMem={}; g.members.forEach(m=>{expByMem[m.id]=0;}); g.expenses.forEach(e=>{if(expByMem[e.paidBy]!==undefined)expByMem[e.paidBy]+=e.amount;});
  const maxExp=Math.max(...Object.values(expByMem),1);
  const maxMon=Math.max(...sorted.map(s=>getDerivedRows(g,s.id).reduce((x,r)=>x+r.total,0)),1);

  return `<div>
  <div class="shdr"><h2>📈 Analytics — ${esc(g.name)}</h2></div>
  <div class="sgrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px">
    ${[['Sheet Total',fN(currT),'#60a5fa'],['Expenses',fN(totalExp),'#a78bfa'],['Members',g.members.length,'var(--amber)'],['Sheets',g.sheets.length,'var(--green)']].map(([l,v,c])=>`<div class="scard"><div class="sl">${l}</div><div class="sv" style="color:${c}">${v}</div></div>`).join('')}
  </div>
  <div class="cgrid" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
    <div class="card"><div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:13px">Category Breakdown</div>
      ${catT.map(c=>`<div style="margin-bottom:9px">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--text2)">${CICO[c.cat]} ${c.cat}</span><span style="font-variant-numeric:tabular-nums">${fN(c.val)} <span style="color:var(--text3)">${total?((c.val/total)*100).toFixed(0):0}%</span></span></div>
        <div class="pbar" style="height:6px"><div class="pfill" style="width:${total?c.val/total*100:0}%;background:${c.col}"></div></div>
      </div>`).join('')}
    </div>
    <div class="card"><div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:13px">Expense per Member</div>
      ${rows.map(r=>{const m=mm[r.memberId];if(!m)return'';return`<div style="margin-bottom:9px">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--text2);display:flex;align-items:center;gap:4px"><div class="av" style="background:${m.color}22;color:${m.color};width:16px;height:16px;font-size:8px">${ini(m.name)}</div>${esc(m.name.split(' ')[0])}</span><span style="font-variant-numeric:tabular-nums">${fN(r.total)}</span></div>
        <div class="pbar" style="height:6px"><div class="pfill" style="width:${maxMem?r.total/maxMem*100:0}%;background:${m.color}"></div></div>
      </div>`;}).join('')}
    </div>
  </div>
  ${g.expenses.length>0?`<div class="card" style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:13px">Expenses Paid by Member</div>
    ${g.members.map(m=>{const val=expByMem[m.id]||0;return`<div style="margin-bottom:9px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--text2);display:flex;align-items:center;gap:4px"><div class="av" style="background:${m.color}22;color:${m.color};width:16px;height:16px;font-size:8px">${ini(m.name)}</div>${esc(m.name.split(' ')[0])}</span><span style="font-variant-numeric:tabular-nums">${fN(val)}</span></div>
      <div class="pbar" style="height:6px"><div class="pfill" style="width:${maxExp?val/maxExp*100:0}%;background:${m.color}"></div></div>
    </div>`;}).join('')}
  </div>`:''}
  ${sorted.length>1?`<div class="card" style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:13px">Monthly Trend</div>
    <div style="display:flex;align-items:flex-end;gap:8px;height:120px;padding:0 4px">
      ${sorted.map(s=>{const t=getDerivedRows(g,s.id).reduce((x,r)=>x+r.total,0);const pct=maxMon?t/maxMon*100:0;const iA=s.id===g.activeSheetId;return`
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;cursor:pointer" onclick="swSheet('${s.id}')">
        <span style="font-size:9px;color:var(--text3);font-variant-numeric:tabular-nums">${fN(t).replace('₹','')}</span>
        <div style="width:100%;border-radius:4px 4px 0 0;background:${iA?'var(--accent)':'var(--border2)'};height:${Math.max(pct,4)}%;min-height:4px;transition:height .4s"></div>
        <span style="font-size:9px;color:${iA?'var(--accent)':'var(--text3)'}">${MS[s.month]}</span>
      </div>`;}).join('')}
    </div>
  </div>`:''}
  <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:12px">🤖 Insights</div>
    ${[
      {ic:'📊',bg:'rgba(59,130,246,.15)',t:`Sheet total <strong>${fN(currT)}</strong> · avg <strong>${fN(currT/Math.max(g.members.length,1))}/person</strong>`},
      {ic:'⚡',bg:'rgba(245,158,11,.15)',t:`Top category: <strong>${catT.reduce((a,b)=>a.val>b.val?a:b,{cat:'—',val:0}).cat}</strong>`},
      g.expenses.length>0&&{ic:'💸',bg:'rgba(16,185,129,.15)',t:`${g.expenses.length} expenses totalling <strong>${fN(totalExp)}</strong>`},
      {ic:'🔁',bg:'rgba(139,92,246,.15)',t:`${g.recurring.filter(r=>r.enabled).length} active recurring expenses`},
      {ic:'👤',bg:'rgba(236,72,153,.15)',t:`Top spender: <strong>${mm[rows.reduce((a,b)=>a.total>b.total?a:b,rows[0]||{memberId:'',total:0})?.memberId]?.name.split(' ')[0]||'—'}</strong>`},
    ].filter(Boolean).map(i=>`<div class="ins"><div style="width:28px;height:28px;border-radius:6px;background:${i.bg};display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">${i.ic}</div><div style="font-size:12px;color:var(--text2);line-height:1.6">${i.t}</div></div>`).join('')}
  </div></div>`;
}

      </select>
    </div>
    <div class="fr"><label>Amount (₹) — split equally</label><input type="number" id="rA" placeholder="0.00"></div>
  </div>
  <div class="fr"><label>Paid By (optional — for investment tracking)</label>
    <select id="rP"><option value="">— None —</option>${g?.members.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('')||''}</select>
  </div>
  <div style="display:flex;align-items:center;gap:7px;padding:8px 10px;background:var(--purple-bg);border:1px solid rgba(139,92,246,.2);border-radius:7px;margin-bottom:10px;cursor:pointer" onclick="document.getElementById('rInv').checked=!document.getElementById('rInv').checked">
    <input type="checkbox" id="rInv" style="width:14px;height:14px;pointer-events:none">
    <span style="font-size:12px;color:var(--text2)">💰 Add to payer's Investment</span>
  </div>
  <div style="background:var(--bg3);border-radius:7px;padding:8px 11px;font-size:11px;color:var(--text3)">Enabling this recurring expense instantly applies it to all monthly sheets in the selected category column.</div>
  <div class="mfoot"><button class="bg2btn" onclick="closeModal()">Cancel</button><button class="bp" onclick="submitAddRecurring()">Add Recurring</button></div>`);}
function submitAddRecurring(){
  const title=document.getElementById('rT')?.value.trim(); const amount=Number(document.getElementById('rA')?.value||0);
  if(!title||!amount){toast('Fill title and amount','⚠','var(--amber)');return;}
  const category=document.getElementById('rCat')?.value||'Other';
  const paidBy=document.getElementById('rP')?.value||null;
  const addToInvestment=document.getElementById('rInv')?.checked||false;
  addRecurring({title,amount,category,enabled:true,paidBy,addToInvestment,memberSplit:null}); closeModal();
}
function editRecurringModal(id){
  const g=AG(); const r=g?.recurring.find(x=>x.id===id); if(!r) return;
  const rCat=r.category||'Other';
  openModal(`<div style="font-size:15px;font-weight:600;margin-bottom:16px">✎ Edit Recurring Expense</div>
  <div class="fr"><label>Title</label><input id="rET" value="${esc(r.title)}" autofocus></div>
  <div class="fgrid">
    <div class="fr"><label>Category — posted to this column</label>
      <select id="rECat">
        ${CATS.map(c=>`<option value="${c}"${c===rCat?' selected':''}>${CICO[c]} ${c}</option>`).join('')}
      </select>
    </div>
    <div class="fr"><label>Amount (₹)</label><input type="number" id="rEA" value="${r.amount}"></div>
  </div>
  <div style="background:var(--bg3);border-radius:7px;padding:8px 11px;font-size:11px;color:var(--text3);margin-bottom:10px">Saving instantly recalculates all sheets using the new category and amount.</div>
  <div class="mfoot"><button class="bg2btn" onclick="closeModal()">Cancel</button><button class="bp" onclick="submitEditRecurring('${id}')">Save & Sync</button></div>`);
}
function submitEditRecurring(id){
  const title=document.getElementById('rET')?.value.trim(); const amount=Number(document.getElementById('rEA')?.value||0);
  const category=document.getElementById('rECat')?.value||'Other';
  if(!title||!amount){toast('Fill title and amount','⚠','var(--amber)');return;}
  updateRecurring(id,{title,amount,category}); closeModal();
}

function openSplitModal(){
  openModal(`<div style="font-size:15px;font-weight:600;margin-bottom:16px">÷ Split Manual Column</div>
  <div class="fr"><label>Category (manual columns only)</label><select id="spC">${['Rent','Cleaning','Gas','Electricity'].map(c=>`<option>${c}</option>`).join('')}</select></div>
  <div class="fr"><label>Total Amount (₹) — split equally among all members</label><input type="number" id="spA" placeholder="0.00" autofocus></div>
  <div class="mfoot"><button class="bg2btn" onclick="closeModal()">Cancel</button><button class="bp" onclick="submitSplit()">Apply</button></div>`);
}
function submitSplit(){
  const cat=document.getElementById('spC')?.value; const amt=Number(document.getElementById('spA')?.value||0);
  if(!cat||!amt){toast('Fill category and amount','⚠','var(--amber)');return;}
  const g=AG(); const sh=AS(); if(!sh) return;
  const per=Number((amt/g.members.length).toFixed(2));
  g.members.forEach(m=>{ if(!sh.manualBase) sh.manualBase={}; if(!sh.manualBase[m.id]) sh.manualBase[m.id]={Rent:0,Cleaning:0,Gas:0,Electricity:0,Investment:0}; sh.manualBase[m.id][cat]=per; });
  toast(`${cat} split ${fN(amt)} equally`,'÷'); commit(); closeModal();
}

function showMemberDetail(memberId){
  const g=AG(); const sh=AS(); if(!g||!sh) return;
  const rows=getDerivedRows(g,sh.id);
  const row=rows.find(r=>r.memberId===memberId); const mm=MM(); const m=mm[memberId];
  if(!m||!row) return;
  openModal(`<div style="display:flex;align-items:center;gap:11px;margin-bottom:16px">
    <div class="av av-lg" style="background:${m.color}22;color:${m.color}">${ini(m.name)}</div>
    <div><div style="font-size:16px;font-weight:700">${esc(m.name)}</div><span class="badge" style="background:rgba(37,99,235,.15);color:#60a5fa">${m.role}</span></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px">
    ${CATS.map(c=>`<div style="display:flex;justify-content:space-between;padding:6px 10px;background:var(--bg3);border-radius:7px"><span style="color:var(--text2)">${CICO[c]} ${c}${c==='Other'?'<span style="font-size:9px;color:#a78bfa;margin-left:4px">auto</span>':''}</span><span style="font-variant-numeric:tabular-nums;font-weight:600">${fN(row[c])}</span></div>`).join('')}
    <div style="height:1px;background:var(--border);margin:4px 0"></div>
    ${[['Σ Total',row.total,'#60a5fa'],['Investment',row.Investment,'#a78bfa'],['Payable',row.payable,row.payable<0?'var(--green)':'var(--red)']].map(([l,v,c])=>`<div style="display:flex;justify-content:space-between;padding:8px 10px;background:var(--bg4);border-radius:7px"><span style="color:var(--text2);font-weight:500">${l}</span><span style="font-variant-numeric:tabular-nums;font-weight:700;font-size:14px;color:${c}">${fN(v)}</span></div>`).join('')}
  </div>
  <div style="margin-top:11px;padding:9px;border-radius:7px;text-align:center;background:${row.payable<0?'var(--green-bg)':'var(--red-bg)'};border:1px solid ${row.payable<0?'var(--green-bdr)':'var(--red-bdr)'};color:${row.payable<0?'var(--green)':'var(--red)'};font-weight:600;font-size:13px">
    ${row.payable<0?`Will receive ${fN(Math.abs(row.payable))}`:`Needs to pay ${fN(row.payable)}`}
  </div>
  <div class="mfoot"><button class="bg2btn" onclick="closeModal()">Close</button></div>`);
}

// DB Settings Modal
function openDbSettings(){
  const cfg=loadPgConfig()||{};
  openModal(`<div style="font-size:15px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px">🗄 PostgreSQL Connection</div>
  <div style="font-size:11px;color:var(--text3);margin-bottom:16px">Configure your backend API that connects to PostgreSQL.</div>
  <div style="background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.2);border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:var(--text2)">
    <strong style="color:var(--text)">Setup Required:</strong> Deploy the Node.js backend (see instructions below), then enter the API URL.
  </div>
  <div class="fr"><label>Backend API URL</label><input id="pgUrl" value="${esc(cfg.apiUrl||'')}" placeholder="http://localhost:3001" autofocus></div>
  <div class="fr"><label>API Key (optional)</label><input id="pgKey" type="password" value="${esc(cfg.apiKey||'')}" placeholder="your-secret-key"></div>
  <details style="margin-bottom:14px">
    <summary style="cursor:pointer;font-size:12px;color:var(--accent);font-weight:500;padding:8px 0">📋 Backend Setup Instructions (click to expand)</summary>
    <div style="margin-top:10px;background:var(--bg3);border-radius:8px;padding:12px;font-size:11px;color:var(--text2);line-height:1.8">
      <strong style="color:var(--text)">1. Install Node.js dependencies:</strong><br>
      <code style="background:var(--bg4);padding:2px 6px;border-radius:4px;color:#60a5fa">npm install express pg cors</code><br><br>
      <strong style="color:var(--text)">2. Create server.js:</strong><br>
      <div style="background:var(--bg4);border-radius:6px;padding:10px;font-family:monospace;font-size:10px;color:#a78bfa;overflow-x:auto;white-space:pre">const express=require('express'),{Pool}=require('pg'),cors=require('cors'),app=express();
app.use(cors(),express.json());
const db=new Pool({connectionString:process.env.DATABASE_URL,ssl:{rejectUnauthorized:false}});
db.query(\`CREATE TABLE IF NOT EXISTS roomsplit(key TEXT PRIMARY KEY,data JSONB,updated_at TIMESTAMPTZ DEFAULT NOW())\`);
app.get('/api/health',(req,res)=>res.json({ok:true}));
app.get('/api/roomsplit',(req,res)=>db.query('SELECT data FROM roomsplit WHERE key=$1',[req.query.key]).then(r=>res.json({data:r.rows[0]?.data||null})));
app.post('/api/roomsplit',(req,res)=>db.query('INSERT INTO roomsplit(key,data) VALUES($1,$2) ON CONFLICT(key) DO UPDATE SET data=$2,updated_at=NOW()',[req.body.key,req.body.data]).then(()=>res.json({ok:true})));
app.listen(process.env.PORT||3001,()=>console.log('RoomSplit API running'));</div>
      <strong style="color:var(--text)">3. Set env var:</strong><br>
      <code style="background:var(--bg4);padding:2px 6px;border-radius:4px;color:#60a5fa">DATABASE_URL=postgresql://user:pass@host:5432/dbname</code><br><br>
      <strong style="color:var(--text)">4. Run:</strong> <code style="background:var(--bg4);padding:2px 6px;border-radius:4px;color:#60a5fa">node server.js</code><br>
      <strong style="color:var(--text)">Deploy options:</strong> Railway, Render, Heroku, Supabase, Neon, Fly.io
    </div>
  </details>
  <div id="connResult"></div>
  <div class="mfoot">
    <button class="bg2btn" onclick="closeModal()">Cancel</button>
    <button class="bg2btn bsm" onclick="testPgConnection()">🔌 Test</button>
    <button class="bp" onclick="savePgSettings()">Save & Connect</button>
  </div>`);
}
async function testPgConnection(){
  const url=document.getElementById('pgUrl')?.value.trim();
  const res=document.getElementById('connResult');
  if(!url){if(res)res.innerHTML='<div class="conn-status fail">⚠ Enter API URL first</div>';return;}
  if(res) res.innerHTML='<div class="conn-status idle">⏳ Testing connection…</div>';
  try{
    const r=await fetch(`${url}/api/health`,{method:'GET',signal:AbortSignal.timeout(5000)});
    const j=await r.json();
    if(res) res.innerHTML=`<div class="conn-status ok">✓ Connected! API responded: ${JSON.stringify(j)}</div>`;
  }catch(e){
    if(res) res.innerHTML=`<div class="conn-status fail">✕ Cannot reach ${url}<br><small>${e.message}</small></div>`;
  }
}
function savePgSettings(){
  const apiUrl=document.getElementById('pgUrl')?.value.trim();
  const apiKey=document.getElementById('pgKey')?.value.trim();
  if(!apiUrl){toast('Enter API URL','⚠','var(--amber)');return;}
  const cfg={apiUrl,apiKey};
  savePgConfig(cfg); pgConfig=cfg; pgApiBase=apiUrl;
  closeModal();
  tryPgConnect().then(ok=>{ if(ok) toast('PostgreSQL connected!','🗄','var(--green)'); else toast('API unreachable — using local storage','⚠','var(--amber)'); });
}

// FIX 4: SCREENSHOT — captures only the expense table as PNG
// ═══════════════════════════════════════════════════════════════
async function takeScreenshot(sheetLabel){
  const target=document.getElementById('expenseTableWrap');
  if(!target){toast('Table not found','⚠','var(--amber)');return;}
  toast('Capturing screenshot…','📸','var(--amber)');
  // Load html2canvas dynamically if not already loaded
  if(!window.html2canvas){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload=res; s.onerror=rej;
      document.head.appendChild(s);
    });
  }
  try{
    const canvas=await window.html2canvas(target,{
      backgroundColor:'#0d1420',
      scale:2,
      useCORS:true,
      logging:false,
      windowWidth:target.scrollWidth+40,
      scrollX:0,scrollY:0,
    });
    const link=document.createElement('a');
    link.download=`expense-sheet-${sheetLabel}.png`;
    link.href=canvas.toDataURL('image/png');
    link.click();
    toast('Screenshot downloaded!','📸');
  }catch(e){
    toast('Screenshot failed: '+e.message,'⚠','var(--red)');
  }
}

// ═══════════════════════════════════════════════════════════════
// SIDEBAR & EVENTS
// ═══════════════════════════════════════════════════════════════
function closeSB(){ document.getElementById('sidebar')?.classList.remove('open'); document.getElementById('ovl')?.classList.remove('open'); }
function toggleSB(){ document.getElementById('sidebar')?.classList.toggle('open'); document.getElementById('ovl')?.classList.toggle('open'); }
function bindEvents(){
  document.querySelectorAll('.ci').forEach(inp=>{
    inp.addEventListener('keydown',e=>{
      if(e.key==='Tab'||e.key==='Enter'){
        e.preventDefault();
        const all=[...document.querySelectorAll('.ci')]; const i=all.indexOf(e.target); all[i+1]?.focus();
      }
    });
  });
}
function exportCSV(){
  const g=AG(); const sh=AS(); if(!sh){toast('No sheet','⚠','var(--amber)');return;}
  const rows=getDerivedRows(g,sh.id);
  const mm=MM();
  const h=['Name',...CATS,'Investment','Total','Payable'];
  const csv=[h.join(','),...rows.map(r=>{const m=mm[r.memberId];return[m?.name,...CATS.map(c=>r[c]),r.Investment,r.total,r.payable].join(',');})].join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=`RoomSplit_${g?.name||'export'}.csv`; a.click();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function init(){
  setDbStatus('connecting');
  const saved=await dbLoad();
  STATE=saved||makeDefault();
  render();
  document.getElementById('hamBtn')?.addEventListener('click',toggleSB);
  document.getElementById('ovl')?.addEventListener('click',closeSB);
  document.getElementById('csvBtn')?.addEventListener('click',exportCSV);
  document.getElementById('dupBtn')?.addEventListener('click',dupSheet);
  document.getElementById('addMbBtn')?.addEventListener('click',openAddMemberModal);
  document.getElementById('addGrpBtn')?.addEventListener('click',openAddGroupModal);
  document.getElementById('dbSettingsBtn')?.addEventListener('click',openDbSettings);
  document.getElementById('resetBtn')?.addEventListener('click',()=>{ if(confirm('Reset to sample data?')){STATE=makeDefault();commit();} });
  document.getElementById('mbg')?.addEventListener('click',e=>{ if(e.target===document.getElementById('mbg')) closeModal(); });
}
init();
